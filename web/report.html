<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日报中心 - 高频电商价格指数计算平台</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="header">
        <div class="date-info">自动化价格指数日报</div>
        <h1>高频电商价格指数计算平台</h1>
        <div class="nav">
            <a href="/">首页大屏</a>
            <a href="/category.html">类目分析</a>
            <a href="/sku.html">SKU分析</a>
            <a href="/anomaly.html">异常数据</a>
            <a href="/report.html" class="active">日报中心</a>
        </div>
    </div>
    <div class="page-container">
        <div class="page-header">
            <h2>每日价格指数报告</h2>
            <div class="search-box">
                <select id="reportDate" onchange="loadReport()"></select>
                <button onclick="exportReport()">导出报告</button>
            </div>
        </div>

        <div id="reportContent">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        function formatChange(val) {
            if (val === null || val === undefined || isNaN(val)) return '--';
            const prefix = val > 0 ? '+' : '';
            return prefix + val.toFixed(2) + '%';
        }

        function loadReportList() {
            fetch('/api/report/list')
                .then(r => r.json())
                .then(data => {
                    const sel = document.getElementById('reportDate');
                    sel.innerHTML = data.map(d => `<option value="${d}">${d}</option>`).join('');
                    if (data.length > 0) {
                        loadReport();
                    }
                });
        }

        function loadReport() {
            const date = document.getElementById('reportDate').value;
            fetch('/api/report/latest')
                .then(r => r.json())
                .then(data => {
                    renderReport(data);
                });
        }

        function renderReport(data) {
            const html = `
                <div class="report-section">
                    <h3>📊 报告概览</h3>
                    <div class="report-summary">
                        <div class="report-summary-item">
                            <div class="label">报告日期</div>
                            <div class="value" style="font-size:20px;">${data.date}</div>
                        </div>
                        <div class="report-summary-item">
                            <div class="label">全网价格指数</div>
                            <div class="value" style="color:#4fc3f7;">${data.overall_index.toFixed(2)}</div>
                        </div>
                        <div class="report-summary-item">
                            <div class="label">日环比涨跌幅</div>
                            <div class="value" style="color:${data.overall_mom_change >= 0 ? '#ff5252' : '#4caf50'}">
                                ${formatChange(data.overall_mom_change)}
                            </div>
                        </div>
                        <div class="report-summary-item">
                            <div class="label">费雪指数</div>
                            <div class="value" style="color:#ffb74d;">${data.fisher_index.toFixed(2)}</div>
                        </div>
                    </div>
                    <div class="report-summary">
                        <div class="report-summary-item">
                            <div class="label">商品覆盖数</div>
                            <div class="value">${data.product_count}</div>
                        </div>
                        <div class="report-summary-item">
                            <div class="label">类目覆盖数</div>
                            <div class="value">${data.category_count}</div>
                        </div>
                        <div class="report-summary-item">
                            <div class="label">异常数据数</div>
                            <div class="value" style="color:#ff9800;">${data.anomaly_count}</div>
                        </div>
                        <div class="report-summary-item">
                            <div class="label">生成时间</div>
                            <div class="value" style="font-size:16px;">${data.generate_time}</div>
                        </div>
                    </div>
                </div>

                <div class="charts-row">
                    <div class="chart-card">
                        <div class="chart-title">📈 涨幅最高的5个类目</div>
                        <div style="padding:10px 0;">
                            ${data.top_gain_categories.map((item, i) => `
                                <div style="display:flex;align-items:center;padding:12px 8px;border-bottom:1px solid rgba(42,108,184,0.3);">
                                    <span style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,${i === 0 ? '#ff5722' : i === 1 ? '#ff9800' : '#ffc107'}, #ffb74d);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;margin-right:12px;">${i + 1}</span>
                                    <span style="flex:1;color:#e3f2fd;font-size:14px;">${item.target_name}</span>
                                    <span style="color:#fff;font-weight:bold;margin-right:10px;">${item.price_index.toFixed(2)}</span>
                                    <span style="color:#ff5252;font-size:13px;">${formatChange(item.mom_change_rate)}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="chart-card">
                        <div class="chart-title">📉 跌幅最高的5个类目</div>
                        <div style="padding:10px 0;">
                            ${data.top_loss_categories.map((item, i) => `
                                <div style="display:flex;align-items:center;padding:12px 8px;border-bottom:1px solid rgba(42,108,184,0.3);">
                                    <span style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,${i === 0 ? '#2e7d32' : i === 1 ? '#388e3c' : '#4caf50'}, #81c784);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;margin-right:12px;">${i + 1}</span>
                                    <span style="flex:1;color:#e3f2fd;font-size:14px;">${item.target_name}</span>
                                    <span style="color:#fff;font-weight:bold;margin-right:10px;">${item.price_index.toFixed(2)}</span>
                                    <span style="color:#4caf50;font-size:13px;">${formatChange(item.mom_change_rate)}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>

                <div class="report-section">
                    <h3>⚡ 波动最大的10个SKU</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>排名</th>
                                <th>商品名称</th>
                                <th>价格指数</th>
                                <th>日环比涨跌幅</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.top_volatile_skus.map((item, i) => `
                                <tr>
                                    <td>${i + 1}</td>
                                    <td>${item.target_name}</td>
                                    <td>${item.price_index.toFixed(2)}</td>
                                    <td style="color:${item.mom_change_rate >= 0 ? '#ff5252' : '#4caf50'}">
                                        ${formatChange(item.mom_change_rate)}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>

                <div class="report-section">
                    <h3>📋 报告说明</h3>
                    <div style="color:#90caf9;line-height:2;font-size:13px;">
                        <p>1. 本报告由系统自动生成，数据基于前一日电商商品价格数据计算。</p>
                        <p>2. 价格指数以2025-05-17为基期，基期指数=100。</p>
                        <p>3. 加权指数采用商品销量权重加权计算，费雪指数为拉氏指数与派氏指数的几何平均。</p>
                        <p>4. 异常数据包括：价格为0、价格突增/突降超过阈值、字段缺失等情况。</p>
                        <p>5. 数据处理流程：ODS原始数据 → DWD清洗明细 → DWS汇总统计 → ADS指数结果。</p>
                    </div>
                </div>
            `;
            document.getElementById('reportContent').innerHTML = html;
        }

        function exportReport() {
            const date = document.getElementById('reportDate').value;
            alert('报告导出功能 - ' + date + '\n\n实际项目中可导出为PDF/Excel格式');
        }

        window.onload = function() {
            loadReportList();
        };
    </script>
</body>
</html>
